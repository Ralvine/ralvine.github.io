theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      #primary: custom
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
  font:
    text: Noto Serif SC # Comic Sans MS # Palatino
    code: Roboto Mono
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
  language: 'zh'
  features:
    # - navigation.instant
    # - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.tabs.sticky
    - navigation.prune
    - toc.follow
    - content.code.annotate
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - navigation.footer
plugins:
  - glightbox:
       touchNavigation: true
       loop: false
       effect: zoom
       slide_effect: slide
       width: 100%
       height: auto
       zoomable: true
       draggable: true
       skip_classes:
         - custom-skip-class-name
       auto_caption: false
       caption_position: bottom
       background: white
       shadow: true
  - changelog:
      file: docs/changelog.yml
  # - comments
    # separator: '[\s\u200b\-]'
  - statistics:
      page_check_metadata: 'statics'
  # - termynal:
  #     title: ""
  #     buttons: macos
  #     prompt_literal_start:
  #       - "$"
  #       - ">"
  #       - "%"
  # - social:
  #     cards_layout_options:
  #       font_family: Noto Sans SC
  # - blog
  - tags:
      tags_file: home/tags.md
  - rss:
      match_path: (diary|mindkit)/(?!index\.md).+
      date_from_meta:
        datetime_format: "%Y-%m-%d"
        as_creation: "create_date"
        as_update: true
      categories:
        - tags
      use_git: false
      abstract_chars_count: 160
  - search
  - encryptcontent:
      title_prefix: '🔐'
      summary: '您没有权限访问此页'
      placeholder: '密码'
      decryption_failure_message: '密码错误！'
      encryption_info_message: "请在此输入访问此页的密码。"
      # input_class: 'md-search__form md-search__input'
      # button_class: 'md-search__icon'

