extra_javascript:
  - javascripts/extra.js
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js # 支持表格排序
  - javascripts/tablesort.js
  - https://unpkg.com/valine@1.5.1/dist/Valine.min.js
  - https://cdn.staticfile.org/jquery/2.1.1/jquery.min.js
  # - https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js
  - javascripts/bootstrap.min.js
  # - https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js
  - https://cdn.jsdelivr.net/npm/aplayer@1.7.0/dist/APlayer.min.js
  - https://cdn.jsdelivr.net/npm/meting@1.1.0/dist/Meting.min.js
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - footnotes
  # - neoteroi.cards
  # - neoteroi.timeline
  - meta
  - toc:
      permalink: ·
      # title: On this page
      permalink_title: 跳转到此部分
      slugify: !!python/name:pymdownx.slugs.uslugify # enable Unicode link
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.snippets: # 允许将其他文件内容插入文件，语法是 --8<-- "filename.ext" 等，参见 https://facelessuser.github.io/pymdown-extensions/extensions/snippets/#snippets-notation
      auto_append:
        - includes/abbreviations.md
      base_path: ["docs"]
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
